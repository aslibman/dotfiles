name: Update flake.lock
on:
  schedule:
    # Run weekly on Monday at 9:00 AM UTC
    - cron: '0 9 * * 1'
  workflow_dispatch: # Allow manual triggering
jobs:
  update-flake-lock:
    runs-on: ubuntu-latest
    outputs:
      has_changes: ${{ steps.update.outputs.has_changes }}
    steps:
      - name: Check out repository code
        uses: actions/checkout@v5
        with:
          path: checkout
      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main
      - name: Update flake.lock
        id: update
        run: |
          cd "${GITHUB_WORKSPACE}/checkout/home/private_dot_config/home-manager"
          nix flake update
          if git diff --quiet flake.lock; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "No changes to flake.lock"
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "flake.lock has been updated"
          fi
      - name: Upload updated flake.lock
        if: steps.update.outputs.has_changes == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: flake-lock
          path: checkout/home/private_dot_config/home-manager/flake.lock
  validate:
    needs: update-flake-lock
    if: needs.update-flake-lock.outputs.has_changes == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - name: Check out repository code
        uses: actions/checkout@v5
        with:
          path: checkout
      - name: Download updated flake.lock
        uses: actions/download-artifact@v4
        with:
          name: flake-lock
          path: checkout/home/private_dot_config/home-manager
      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main
      - name: Install chezmoi
        run: |
          nix profile add nixpkgs#chezmoi
      - name: Initialize chezmoi and apply dotfiles
        run: |
          chezmoi init --apply --source="${GITHUB_WORKSPACE}/checkout"
  commit-and-push:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository code
        uses: actions/checkout@v5
      - name: Download updated flake.lock
        uses: actions/download-artifact@v4
        with:
          name: flake-lock
          path: home/private_dot_config/home-manager
      - name: Commit and push changes
        run: |
          cd "${GITHUB_WORKSPACE}/home/private_dot_config/home-manager"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add flake.lock
          git commit -m "chore: update flake.lock

          Co-Authored-By: github-actions[bot] <github-actions[bot]@users.noreply.github.com>"
          git push
