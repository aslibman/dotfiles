repos:
  - repo: local
    hooks:
      - id: nixfmt
        name: nixfmt
        entry: treefmt --fail-on-change
        language: system
        pass_filenames: false
        files: \.(nix|ya?ml)$
      - id: shellcheck
        name: shellcheck
        entry: shellcheck --color=always
        language: system
        types: [shell]
